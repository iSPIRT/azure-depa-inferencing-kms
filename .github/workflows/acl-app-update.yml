name: Update code in ACL

permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: "Target environment (UAT or Production)"
        options:
          - UAT
          - Production
        default: Production
      deployment_name:
        type: string
        description: "Name of the deployment"
        default: "depa-inferencing-kms-prod-cin"
      kms_url:
        type: string
        description: "KMS URL"
        default: "https://depa-inferencing-kms-azure.ispirt.in"
  workflow_call:
    inputs:
      environment:
        type: string
        description: "Target environment (UAT or Production)"
        default: Production
      deployment_name:
        type: string
        description: "Name of the deployment"
        default: "depa-inferencing-kms-prod-cin"
      kms_url:
        type: string
        description: "KMS URL"
        default: "https://depa-inferencing-kms-azure.ispirt.in"

jobs:
  deploy:
    name: ${{ inputs.deployment_name }}
    runs-on: ubuntu-latest
    continue-on-error: false
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        env:
          GH_TOKEN: ${{ github.token }}
        run: pip install -r requirements.txt

      - name: Log into Azure
        uses: azure/login@v2
        with:
          # Use a managed identity to authenticate to Azure
          # Use properties such as client-id, tenant-id, and subscription-id in the secrets and vars
          # The managed identity should have a federated credential with subject identiier repo:<organization>/<repo>:pull_request
          # Use subject identifier repo:<organization>/<repo>:ref:refs/heads/<branch> for running manual CI's
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download KMS service certificate
        env:
          DEPLOYMENT_NAME: ${{ inputs.deployment_name }}
        run: |
          export KMS_SERVICE_CERT_PATH=${GITHUB_WORKSPACE}/service_cert.pem
          curl https://identity.confidential-ledger.core.azure.com/ledgerIdentity/$DEPLOYMENT_NAME \
            | jq -r '.ledgerTlsCertificate' > $KMS_SERVICE_CERT_PATH

      - name: Update KMS application
        env:
          DEPLOYMENT_NAME: ${{ inputs.deployment_name }}
          KMS_URL: ${{ inputs.kms_url }}
        run: |
          export KMS_SERVICE_CERT_PATH=${GITHUB_WORKSPACE}/service_cert.pem
          make js-app-set
