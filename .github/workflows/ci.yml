name: CI

permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lint
        run: make lint

  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Unit Tests
        run: npm i && npm run test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: E2E tests
        run: make demo

      - name: Print CCF logs
        run: cat workspace/sandbox_0/out

  system-ccf-acl:
    name: system / ccf-acl (${{ matrix.use_akv && 'akv' || 'local' }}_keys)
    secrets: inherit # pragma: allowlist secret
    strategy:
      fail-fast: false
      matrix:
        use_akv: [false]
    uses: ./.github/workflows/system-tests.yml
    with:
      env: acl
      use_akv: ${{ matrix.use_akv }}
