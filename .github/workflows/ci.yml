name: CI

permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lint
        run: make lint

  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Unit Tests
        run: npm i && npm run test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: pip install -r requirements.txt

  system-acl:
    name: system test_all_seq (acl)
    secrets: inherit # pragma: allowlist secret
    uses: ./.github/workflows/system-test.yml
    with:
      test_path: test_all_seq
      env: acl
      use_akv: false
