name: Refresh keys

permissions:
  id-token: write
  contents: read

on:
  schedule:
    # Run every Sunday at 02:00 IST (20:30 Saturday UTC) — UAT and Production in parallel
    - cron: '30 20 * * 6'
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: "Target environment (UAT or Production)"
        options:
          - UAT
          - Production
        default: UAT
  workflow_call:
    inputs:
      environment:
        type: string
        description: "Target environment (UAT or Production)"
        default: UAT

# Required on each GitHub Environment (UAT, Production) — Environment variables:
#   ACL_DEPLOYMENT_NAME — Confidential Ledger deployment name

jobs:
  # Scheduled: refresh UAT and Production in parallel (matrix: one row per environment)
  refresh-scheduled:
    if: github.event_name == 'schedule'
    name: refresh (${{ matrix.environment }})
    strategy:
      fail-fast: false
      matrix:
        environment: [Production, UAT]
    runs-on:
      - self-hosted
      - ${{ matrix.environment == 'Production' && 'prod' || 'uat' }}
    continue-on-error: false
    environment: ${{ matrix.environment }}
    env:
      DEPLOYMENT_NAME: ${{ vars.ACL_DEPLOYMENT_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Log into Azure
        uses: azure/login@v2
        with:
          # Use a managed identity to authenticate to Azure
          # Use properties such as client-id, tenant-id, and subscription-id in the secrets and vars
          # The managed identity should have a federated credential with subject identiier repo:<organization>/<repo>:pull_request
          # Use subject identifier repo:<organization>/<repo>:ref:refs/heads/<branch> for running manual CI's
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Get service certificate
        run: |
          curl https://identity.confidential-ledger.core.azure.com/ledgerIdentity/${{ env.DEPLOYMENT_NAME }} \
          | jq -r '.ledgerTlsCertificate' > ${GITHUB_WORKSPACE}/service_cert.pem
      - name: Call refresh
        run: |
          set -euo pipefail
          export KMS_SERVICE_CERT_PATH="${GITHUB_WORKSPACE}/service_cert.pem"
          KMS_BASE="https://${DEPLOYMENT_NAME}.confidential-ledger.azure.com"
          KMS_BASE="${KMS_BASE%/}"

          curl "${KMS_BASE}/app/listpubkeys" --cacert "${KMS_SERVICE_CERT_PATH}" \
            -H "Content-Type: application/json" -w '\n' | jq

          TOKEN=$(az account get-access-token --resource https://confidential-ledger.azure.com | jq -r '.accessToken')
          curl -X POST "${KMS_BASE}/app/refresh" --cacert "${KMS_SERVICE_CERT_PATH}" \
            -H "Authorization: Bearer ${TOKEN}" -H "Content-Type: application/json" -w '\n' | jq

          curl "${KMS_BASE}/app/listpubkeys" --cacert "${KMS_SERVICE_CERT_PATH}" \
            -H "Content-Type: application/json" -w '\n' | jq

  # Manual / reusable: one target per run
  refresh:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call'
    name: refresh (${{ inputs.environment || 'Production' }})
    runs-on:
      - self-hosted
      - ${{ inputs.environment == 'UAT' && 'uat' || 'prod' }}
    continue-on-error: false
    environment: ${{ inputs.environment || 'Production' }}
    env:
      DEPLOYMENT_NAME: ${{ vars.ACL_DEPLOYMENT_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Log into Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Get service certificate
        run: |
          curl https://identity.confidential-ledger.core.azure.com/ledgerIdentity/${{ env.DEPLOYMENT_NAME }} \
          | jq -r '.ledgerTlsCertificate' > ${GITHUB_WORKSPACE}/service_cert.pem
      - name: Call refresh
        run: |
          set -euo pipefail
          export KMS_SERVICE_CERT_PATH="${GITHUB_WORKSPACE}/service_cert.pem"
          KMS_BASE="https://${DEPLOYMENT_NAME}.confidential-ledger.azure.com"
          KMS_BASE="${KMS_BASE%/}"

          curl "${KMS_BASE}/app/listpubkeys" --cacert "${KMS_SERVICE_CERT_PATH}" \
            -H "Content-Type: application/json" -w '\n' | jq

          TOKEN=$(az account get-access-token --resource https://confidential-ledger.azure.com | jq -r '.accessToken')
          curl -X POST "${KMS_BASE}/app/refresh" --cacert "${KMS_SERVICE_CERT_PATH}" \
            -H "Authorization: Bearer ${TOKEN}" -H "Content-Type: application/json" -w '\n' | jq

          curl "${KMS_BASE}/app/listpubkeys" --cacert "${KMS_SERVICE_CERT_PATH}" \
            -H "Content-Type: application/json" -w '\n' | jq
